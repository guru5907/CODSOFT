<!DOCTYPE html>
<html>
<head>
<title>Employer Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Employer Dashboard</h1>

<form onsubmit="return postJob()">

<input
type="text"
id="jobTitle"
placeholder="Job Title">

<input
type="text"
id="company"
placeholder="Company">

<input
type="text"
id="location"
placeholder="Location">

<button type="submit">
Post Job
</button>

</form>

<script src="script.js"></script>
</body>
</html>
